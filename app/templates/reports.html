<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Reports - Forensic Medical DB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <!-- Re-using sidebar from before, shortened for brevity here but identical in structure -->
        <div class="sidebar-brand"><i data-feather="shield"></i> ForensicDB</div>
        <ul class="nav-menu">
            <li><a href="dashboard.html" class="nav-link"><i data-feather="grid"></i> Dashboard</a></li>
            <li><a href="patients.html" class="nav-link"><i data-feather="users"></i> Patients</a></li>
            <li><a href="cases.html" class="nav-link"><i data-feather="folder"></i> Clinical Cases</a></li>
            <li><a href="autopsies.html" class="nav-link"><i data-feather="activity"></i> Postmortems</a></li>
            <li><a href="evidence.html" class="nav-link"><i data-feather="archive"></i> Evidence</a></li>
            <li><a href="court_reports.html" class="nav-link"><i data-feather="file-text"></i> Reports</a></li>
            <li style="margin-top: 2rem;"><a href="reports.html" class="nav-link active"><i data-feather="pie-chart"></i> Analytics</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Analytics & Statistical Reports</h1>
            <div class="user-profile"><span class="user-name">Dr. Wickramasinghe</span><div class="avatar">W</div></div>
        </header>

        <div class="form-card">
            <div class="form-title"><i data-feather="filter"></i> Report Configuration</div>
            <form action="#">
                <div class="form-grid">
                    <div class="form-group"><label>Report Type</label><select class="form-control"><option>Monthly Statistics (All)</option><option>Clinical Cases Only</option><option>Autopsy Cases Only</option></select></div>
                    <div class="form-group"><label>Start Date</label><input type="date" class="form-control"></div>
                    <div class="form-group"><label>End Date</label><input type="date" class="form-control"></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-primary"><i data-feather="download" style="width: 16px;"></i> Export to PDF</button>
                    <button type="button" class="btn-primary" style="background-color: var(--success);"><i data-feather="file" style="width: 16px;"></i> Export to Excel</button>
                </div>
            </form>
        </div>
        
        <!-- Placeholder for a generated report view -->
        <div class="chart-section" style="text-align: center; color: var(--text-secondary); padding: 4rem;">
            <i data-feather="bar-chart-2" style="width: 48px; height: 48px; opacity: 0.5; margin-bottom: 1rem;"></i>
            <p>Configure and generate a report above to view statistics.</p>
        </div>
    </main>
    <script>feather.replace()</script>
</body>
</html>
